<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MNIST TensorFlow.js Demo</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis"></script>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<h2>MNIST CNN Trainer (Browser)</h2>

<div class="layout">

<div class="controls">

<h3>Dataset</h3>

<input type="file" id="trainFile">
<input type="file" id="testFile">

<button id="loadBtn">Load Data</button>
<button id="resetBtn">Reset</button>

<h3>Training</h3>

<button id="trainBtn">Train</button>
<button id="evalBtn">Evaluate</button>
<button id="testBtn">Test 5 Random</button>

<h3>Model</h3>

<button id="saveBtn">Save Model</button>

<input type="file" id="modelJson">
<input type="file" id="modelWeights">

<button id="loadModelBtn">Load Model</button>

</div>

<div class="results">

<h3>Status</h3>
<div id="status"></div>

<h3>Metrics</h3>
<div id="metrics"></div>

<h3>Preview</h3>
<div id="previewRow"></div>

</div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
